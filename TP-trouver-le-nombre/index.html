<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rochester&display=swap" rel="stylesheet">
    <title>Document</title>
</head>
<body>
    <h1>Trouve le nombre</h1>
    <div class="premierplan" id="container">
        <h4>Je pense à un nombre entier entre 1 et 100.</h4>
        <div class="flex">
            <div class="moitie">
                <div class="bloc">
                    <select id="niveau" class="green" onclick=choixNiveau()>
                        <option value="facile" class="green">Facile</option>
                        <option value="moyen" class="orange">Moyen</option>
                        <option value="difficile" class="red">Difficile</option>
                    </select>
                    <div>
                        <input type="number" id="number">
                        <input type="submit" value="Soumettre" onclick=testValeurSaisie() id="bouton">
                    </div>
                    <div class="decompte">
                        <span>Il vous reste</span>
                        <div class="compteur"><span id="compteur">15</span></div>
                        <span id="tentative">tentatives</span>
                    </div>
                    
                </div>
            </div>
            <div class="moitie">
                <div id="historique"></div>
            </div>
        </div>
    </div>
    <div class="arriereplan" id="fin">
        <div class="flex milieu">
            <h2 id="final"></h2>
            <input type="hidden" onclick=location.reload() id="reset" value="Recommencer">
        </div>
    </div>
    
    <script>
        let randomNumber = Math.floor(Math.random() * 100) + 1
        console.log(randomNumber)

        let count = 15;
        const compteur = document.getElementById("compteur");

        function choixNiveau(){
            const select = document.getElementById("niveau");
            const niveau = select.value;
            randomNumber = Math.floor(Math.random() * 100) + 1
            console.log(randomNumber)
            
            if(niveau=="facile"){
                count = 15;
                select.setAttribute("class","green");
            }else if(niveau=="moyen"){
                count = 10;
                select.setAttribute("class","orange");
            }else if(niveau=="difficile"){
                count=6;
                select.setAttribute("class","red");
            }
            compteur.innerHTML = count;
        }
        

        function testValeurSaisie(){
            const valeur_saisie = document.getElementById("number").value;
            const historique = document.getElementById("historique");
            const reset = document.getElementById("reset");
            const fin = document.getElementById("fin");
            let reponse ="";
            const resultat=document.getElementById("final");
            const tentative=document.getElementById("tentative");
            count--;
            if(count==0){
                compteur.innerHTML = 0;
                reponse.innerHTML = "";
                resultat.innerHTML = "Perdu ...";
                reset.setAttribute("type","submit");
                fin.setAttribute("class","front");
            }else if (count>0){
                compteur.innerHTML = count;
                if (valeur_saisie>randomNumber){
                    reponse = "est trop grand";
                }else if (valeur_saisie<randomNumber){
                    reponse = "est trop petit";
                }else if(valeur_saisie==randomNumber){
                    compteur.innerHTML = 0;
                    reponse = "c'est gagné !";
                    resultat.innerHTML = "Gagné !!!";
                    reset.setAttribute("type","submit");
                    fin.setAttribute("class","front");
                }
            }
            historique.innerHTML+=`<p> ${valeur_saisie} ${reponse}</p>`
        }
    </script>
</body>
</html>
